<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PromptPay QR Code Generator</title>
    <!-- เรียกใช้ Library สำหรับสร้าง QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        input { margin: 10px; padding: 8px; width: 250px; }
        button { padding: 10px 20px; background-color: #003d6b; color: white; border: none; cursor: pointer; }
        #qrcode { margin-top: 20px; }
    </style>
</head>
<body>

    <h2>PromptPay QR Code Generator</h2>
    <input type="text" id="target" placeholder="เบอร์โทรศัพท์ หรือ เลขบัตรประชาชน">
    <input type="number" id="amount" placeholder="จำนวนเงิน (ไม่ใส่ก็ได้)">
    <button onclick="generateQR()">สร้าง QR Code</button>

    <div id="qrcode"></div>

    <script>
        function generateQR() {
            const target = document.getElementById('target').value.replace(/-/g, '');
            const amount = document.getElementById('amount').value;
            const qrcodeContainer = document.getElementById('qrcode');
            
            // ล้าง QR Code เก่า
            qrcodeContainer.innerHTML = "";

            // โครงสร้างข้อมูลพื้นฐานของ PromptPay (Payload)
            let payload = "000201010211";
            
            // ข้อมูลผู้รับ (Merchant Account Information)
            const merchantInfo = "006601" + (target.length === 13 ? "02" : "01") + 
                                 target.length.toString().padStart(2, '0') + target;
            payload += "29" + merchantInfo.length.toString().padStart(2, '0') + merchantInfo;
            
            // สกุลเงิน (THB = 764) และ ประเทศ (TH)
            payload += "53037645802TH";

            // จำนวนเงิน (ถ้ามี)
            if (amount && amount > 0) {
                const amtStr = parseFloat(amount).toFixed(2);
                payload += "54" + amtStr.length.toString().padStart(2, '0') + amtStr;
            }

            // ปิดท้ายด้วยเลข Checksum (ในตัวอย่างนี้ใช้แบบ Static หรือต้องคำนวณ CRC16)
            // หมายเหตุ: การสร้างใช้งานจริงต้องมีฟังก์ชันคำนวณ CRC16 ต่อท้าย
            payload += "6304";
            const finalPayload = payload + crc16(payload);

            // สร้าง QR Code
            new QRCode(qrcodeContainer, {
                text: finalPayload,
                width: 256,
                height: 256
            });
        }

        // ฟังก์ชันคำนวณ CRC16 สำหรับ PromptPay
        function crc16(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                let x = ((crc >> 8) ^ data.charCodeAt(i)) & 0xFF;
                x ^= x >> 4;
                crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
            }
            return crc.toString(16).toUpperCase().padStart(4, '0');
        }
    </script>
</body>
</html>
