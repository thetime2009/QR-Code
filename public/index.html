<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบรับชำระและแจ้งโอนเงิน</title>
    <!-- เรียกใช้ Library สำหรับสร้าง QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 350px; }
        input { margin: 10px 0; width: 80%; padding: 8px; }
        button { padding: 10px 20px; background-color: #003d6b; color: white; border: none; cursor: pointer; border-radius: 5px; width: 80%; margin-top: 10px; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        #status { margin-top: 20px; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>ชำระเงินผ่าน PromptPay</h2>
    <div id="qrcode"></div>
    <p style="font-size: 0.9em; color: #666;">สแกน QR เพื่อโอนเงิน</p>

    <hr>

    <h3>แจ้งยืนยันการโอนเงิน</h3>
    <p>กรุณาอัปโหลดสลิปเพื่อตรวจสอบยอด</p>
    
    <input type="file" id="slipInput" accept="image/*">
    <button onclick="uploadAndVerify()">ยืนยันการโอน</button>

    <div id="status"></div>
</div>

<script>
/**
 * ฟังก์ชันสร้างค่า PromptPay ตามมาตรฐาน EMVCo
 * @param {string} target - เบอร์โทรศัพท์ (10 หลัก) หรือ เลขบัตร (13 หลัก)
 * @param {number} amount - จำนวนเงิน (เช่น 100.50)
 */
function generatePromptPay(target, amount) {
    // 1. ล้างค่าที่ไม่ใช่ตัวเลขออกให้หมด
    target = target.replace(/\D/g, ''); 
    
    let payload = "000201010211";
    
    // 2. ตรวจสอบประเภทเป้าหมาย (01 = เบอร์โทรศัพท์, 02 = เลขบัตร/E-Wallet)
    const type = target.length === 10 ? "01" : "02";
    
    // 3. ประกอบ Merchant Account Information (ID 29)
    const merchantInfo = "006601" + type + target.length.toString().padStart(2, '0') + target;
    payload += "29" + merchantInfo.length.toString().padStart(2, '0') + merchantInfo;
    
    // 4. สกุลเงินไทย (764) และประเทศ (TH)
    payload += "53037645802TH";

    // 5. จัดรูปแบบจำนวนเงิน (ID 54) - ต้องมีทศนิยม 2 ตำแหน่ง
    if (amount && amount > 0) {
        const amtStr = parseFloat(amount).toFixed(2);
        payload += "54" + amtStr.length.toString().padStart(2, '0') + amtStr;
    }

    // 6. ส่วนปิดท้ายเพื่อรอการคำนวณ CRC16 (ID 63)
    payload += "6304";
    
    return payload + calculateCRC16(payload);
}

/**
 * ฟังก์ชันคำนวณ CRC16 CCITT
 */
function calculateCRC16(data) {
    let crc = 0xFFFF;
    for (let i = 0; i < data.length; i++) {
        let x = ((crc >> 8) ^ data.charCodeAt(i)) & 0xFF;
        x ^= x >> 4;
        crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
    }
    // แปลงเป็นเลขฐาน 16 และเติม 0 ให้ครบ 4 หลัก
    return crc.toString(16).toUpperCase().padStart(4, '0');
}

// --- วิธีการเรียกใช้งานเพื่อให้สแกนติดแน่นอน ---
window.onload = () => {
    const MY_ID = "0846690495"; // **แก้ไขตรงนี้เป็นเบอร์ของคุณ**
    const MY_AMOUNT = 0;       // ใส่ 0 ถ้าต้องการให้ผู้โอนใส่ยอดเอง
    
    const finalData = generatePromptPay(MY_ID, MY_AMOUNT);
    
    // ตรวจสอบค่าใน Console (กด F12 ใน Browser เพื่อดู)
    console.log("PromptPay Data:", finalData);

    new QRCode(document.getElementById("qrcode"), {
        text: finalData,
        width: 256,
        height: 256,
        correctLevel: QRCode.CorrectLevel.M // ปรับระดับความละเอียดปานกลางเพื่อให้แอปสแกนง่าย
    });
};
</script>

</body>
</html>
