<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจสอบสลิป</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}
.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #0d3b66;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
#status {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">
    <h2>สแกนเพื่อชำระเงิน</h2>
    <p>พร้อมเพย์: 0846690495</p>

    <hr>

    <h3>แจ้งโอนเงิน</h3>

    <input type="file" id="slipInput">
    <button onclick="uploadAndVerify()">ยืนยันการโอนเงิน</button>

    <div id="status"></div>
</div>

<script>
async function uploadAndVerify() {
    const fileInput = document.getElementById('slipInput');
    const statusDiv = document.getElementById('status');

    const file = fileInput.files[0];

    if (!file) {
        alert("กรุณาเลือกไฟล์ก่อน");
        return;
    }

    statusDiv.style.color = "blue";
    statusDiv.innerText = "⏳ กำลังตรวจสอบ...";

    const formData = new FormData();
    formData.append('slip', file);

    try {
        const response = await fetch('http://localhost:3000/verify-slip', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (response.ok && result.success) {
            statusDiv.style.color = "green";
            statusDiv.innerHTML = `✅ สำเร็จ ยอด: ${result.data.amount} บาท`;
        } else {
            statusDiv.style.color = "red";
            statusDiv.innerText = `❌ ${result.message || 'ตรวจสอบไม่สำเร็จ'}`;
        }

    } catch (err) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "⚠️ ติดต่อ server ไม่ได้";
    }
}
</script>

</body>
</html>
