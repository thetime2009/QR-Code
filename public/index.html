<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบรับชำระและแจ้งโอนเงิน</title>
    <!-- เรียกใช้ Library สำหรับสร้าง QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 350px; }
        input { margin: 10px 0; width: 80%; padding: 8px; }
        button { padding: 10px 20px; background-color: #003d6b; color: white; border: none; cursor: pointer; border-radius: 5px; width: 80%; margin-top: 10px; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        #status { margin-top: 20px; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>ชำระเงินผ่าน PromptPay1</h2>
    <div id="qrcode"></div>
    <p style="font-size: 0.9em; color: #666;">สแกน QR เพื่อโอนเงิน</p>

    <hr>

    <h3>แจ้งยืนยันการโอนเงิน</h3>
    <p>กรุณาอัปโหลดสลิปเพื่อตรวจสอบยอด</p>
    
    <input type="file" id="slipInput" accept="image/*">
    <button onclick="uploadAndVerify()">ยืนยันการโอน</button>

    <div id="status"></div>
</div>

<script>
/**
 * ฟังก์ชันสร้างค่า PromptPay ตามมาตรฐาน Thai QR Payment (EMVCo)
 */
function generatePromptPay(target, amount) {
    // 1. ล้างค่าที่ไม่ใช่ตัวเลขออกให้หมด
    target = target.replace(/\D/g, ''); 
    
    // โครงสร้างพื้นฐาน
    let payload = "000201010211";
    
    // 2. ข้อมูลผู้รับเงิน (ID 29)
    // 00010: AID ของ PromptPay ไทยคือ A000000677010111
    const aid = "0016A000000677010111";
    
    // 01: ประเภท (01 = เบอร์มือถือ, 02 = เลขบัตรประชาชน)
    const type = target.length === 10 ? "01" : "02";
    
    // จัดรูปแบบเบอร์โทร: ต้องขึ้นต้นด้วย 0066 หรือ 0 และตามด้วยหมายเลข
    // ในที่นี้เราจะใช้รูปแบบความยาวตัวเลขตรงๆ ตามมาตรฐาน
    const accountInfo = type + target.length.toString().padStart(2, '0') + target;
    
    const merchantInfo = aid + accountInfo;
    payload += "29" + merchantInfo.length.toString().padStart(2, '0') + merchantInfo;
    
    // 3. สกุลเงิน (53) = 764 (THB), ประเทศ (58) = TH
    payload += "53037645802TH";

    // 4. จำนวนเงิน (54)
    if (amount && amount > 0) {
        const amtStr = parseFloat(amount).toFixed(2);
        payload += "54" + amtStr.length.toString().padStart(2, '0') + amtStr;
    }

    // 5. ปิดท้ายด้วย CRC16 (63)
    payload += "6304";
    
    return payload + calculateCRC16(payload);
}

/**
 * ฟังก์ชันคำนวณ CRC16 CCITT (XModem)
 */
function calculateCRC16(data) {
    let crc = 0xFFFF;
    for (let i = 0; i < data.length; i++) {
        let x = ((crc >> 8) ^ data.charCodeAt(i)) & 0xFF;
        x ^= x >> 4;
        crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
    }
    return crc.toString(16).toUpperCase().padStart(4, '0');
}

// การเรียกใช้งานเมื่อหน้าเว็บโหลดเสร็จ
window.onload = () => {
    const MY_ID = "0846690495"; 
    const MY_AMOUNT = 0; // ใส่ 0 เพื่อให้ผู้โอนระบุยอดเงินเอง
    
    const finalData = generatePromptPay(MY_ID, MY_AMOUNT);
    console.log("Generated Payload:", finalData); // ตรวจสอบค่าที่ได้ใน Console

    const qrcodeContainer = document.getElementById("qrcode");
    qrcodeContainer.innerHTML = ""; // ล้างค่าเก่า

    new QRCode(qrcodeContainer, {
        text: finalData,
        width: 256,
        height: 256,
        correctLevel: QRCode.CorrectLevel.L // ปรับระดับความปลอดภัยให้สแกนได้ง่ายที่สุด
    });
};
</script>

</body>
</html>
