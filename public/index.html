<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PromptPay & Verify</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        img { width: 200px; margin: 20px; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>ระบบจ่ายเงิน</h1>
    <input type="number" id="amount" placeholder="ระบุจำนวนเงิน">
    <button onclick="getQR()">สร้าง QR Code</button>
    <div id="qr-display"></div>

    <hr>
    <h3>ยืนยันการโอน</h3>
    <input type="file" id="slipFile" accept="image/*">
    <button onclick="verify()">ตรวจสอบสลิป</button>
    <p id="status"></p>

    <script>
        async function getQR() {
            const amount = document.getElementById('amount').value;
            const res = await fetch('/generateQR', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount })
            });
            const data = await res.json();
            document.getElementById('qr-display').innerHTML = `<img src="${data.qrImage}">`;
        }

        async function verify() {
            const fileInput = document.getElementById('slipFile');
            const status = document.getElementById('status');
            if(!fileInput.files[0]) return alert('เลือกไฟล์ก่อนครับ');

            const formData = new FormData();
            formData.append('slip', fileInput.files[0]);

            status.innerText = "กำลังตรวจสอบ...";
            
            try {
                const res = await fetch('/verify-slip', { // ชื่อต้องตรงกับใน server.js
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                
                if(result.success) {
                    status.innerHTML = `<span class="success">จ่ายเงินสำเร็จ! ยอดเงิน: ${result.data.amount.amount} บาท</span>`;
                } else {
                    status.innerText = "ตรวจสอบไม่ผ่าน: " + (result.message || "สลิปไม่ถูกต้อง");
                }
            } catch (e) {
                status.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
            }
        }
    </script>
</body>
</html>
