<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Upload Slip</title>
</head>
<body>

<h2>อัปโหลดสลิป</h2>

<input type="file" id="file">
<br><br>

<button onclick="uploadSlip()">ตรวจสอบ</button>

<pre id="result"></pre>

<script>
async function uploadSlip() {
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!file) {
    alert("กรุณาเลือกไฟล์");
    return;
  }

  const formData = new FormData();
  formData.append("slip", file); // 🔥 ต้องชื่อ slip ตรงกับ server

  const res = await fetch("https://qr-code-g7f3.onrender.com/verify-slip", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
