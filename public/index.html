<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบรับชำระและแจ้งโอนเงิน</title>
    <!-- เรียกใช้ Library สำหรับสร้าง QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 350px; }
        input { margin: 10px 0; width: 80%; padding: 8px; }
        button { padding: 10px 20px; background-color: #003d6b; color: white; border: none; cursor: pointer; border-radius: 5px; width: 80%; margin-top: 10px; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        #status { margin-top: 20px; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>ชำระเงินผ่าน PromptPay3</h2>
    <div id="qrcode"></div>
    <p style="font-size: 0.9em; color: #666;">สแกน QR เพื่อโอนเงิน</p>

    <hr>

    <h3>แจ้งยืนยันการโอนเงิน</h3>
    <p>กรุณาอัปโหลดสลิปเพื่อตรวจสอบยอด</p>
    
    <input type="file" id="slipInput" accept="image/*">
    <button onclick="uploadAndVerify()">ยืนยันการโอน</button>

    <div id="status"></div>
</div>

<script>
/**
 * ฟังก์ชันสร้างค่า PromptPay (EMVCo Standard)
 */
function generatePromptPay(target, amount) {
    target = target.replace(/\D/g, ''); 
    let targetFormatted = target.length === 10 ? "0066" + target.substring(1) : target;
    
    const aid = "0016A000000677010111"; 
    const mobileTag = "01" + targetFormatted.length.toString().padStart(2, '0') + targetFormatted;
    const merchantAccount = aid + mobileTag;
    
    let data = [
        "000201", 
        "010211", 
        "29" + merchantAccount.length.toString().padStart(2, '0') + merchantAccount,
        "5303764", 
        "5802TH"
    ];

    if (amount && amount > 0) {
        const amtStr = parseFloat(amount).toFixed(2);
        data.push("54" + amtStr.length.toString().padStart(2, '0') + amtStr);
    }

    data.push("6304"); 
    const payload = data.join('');
    return payload + calculateCRC16(payload);
}

function calculateCRC16(data) {
    let crc = 0xFFFF;
    for (let i = 0; i < data.length; i++) {
        let x = ((crc >> 8) ^ data.charCodeAt(i)) & 0xFF;
        x ^= x >> 4;
        crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
    }
    return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
}

/**
 * ฟังก์ชันส่งสลิปไปตรวจสอบที่เซิร์ฟเวอร์หลังบ้าน
 */
async function uploadAndVerify() {
    const fileInput = document.getElementById('slipInput');
    const statusDiv = document.getElementById('status');
    const file = fileInput.files[0];

    if (!file) {
        alert("กรุณาเลือกไฟล์สลิปก่อนครับ");
        return;
    }

    statusDiv.style.color = "blue";
    statusDiv.innerText = "⏳ กำลังตรวจสอบสลิป โปรดรอสักครู่...";

    const formData = new FormData();
    formData.append('slip', file);

    try {
        const response = await fetch('/verify-slip', {
            method: 'POST',
            body: formData
        });

        // ตรวจสอบว่า HTTP Status OK หรือไม่ (เช่น 200, 400, 500)
        const result = await response.json();

        if (response.ok && result.success) {
            statusDiv.style.color = "green";
            // ดึงข้อมูลจำนวนเงินมาแสดง (รองรับโครงสร้าง SlipOK)
            const amount = result.data ? result.data.amount : "ไม่ระบุ";
            statusDiv.innerHTML = `✅ ยืนยันสำเร็จ!<br>ยอดเงินโอน: <strong>${amount}</strong> บาท`;
            fileInput.value = ""; // ล้างค่าไฟล์ที่เลือกไว้
        } else {
            statusDiv.style.color = "red";
            statusDiv.innerText = `❌ ตรวจสอบไม่สำเร็จ: ${result.message || 'ข้อมูลไม่ถูกต้อง'}`;
        }
    } catch (error) {
        console.error("Fetch Error:", error);
        statusDiv.style.color = "red";
        statusDiv.innerText = "⚠️ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่";
    }
}

// รวมการเรียกใช้งานไว้ใน window.onload เดียวกัน
window.onload = () => {
    const MY_ID = "0846690495"; 
    const MY_AMOUNT = 0; 
    
    const qrString = generatePromptPay(MY_ID, MY_AMOUNT);
    
    new QRCode(document.getElementById("qrcode"), {
        text: qrString,
        width: 256,
        height: 256,
        correctLevel: QRCode.CorrectLevel.M
    });
};
</script>

</body>
</html>
