<input type="number" id="amount" placeholder="ระบุจำนวนเงิน">
<button onclick="getQR()">สร้าง QR Code</button>
<div id="qr-display"></div>

<hr>
<input type="file" id="slipInput">
<button onclick="verify()">ยืนยันการโอน</button>

<script>
async function getQR() {
    const amount = document.getElementById('amount').value;
    const res = await fetch('/generateQR', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ amount })
    });
    const data = await res.json();
    document.getElementById('qr-display').innerHTML = `<img src="${data.qrImage}">`;
}
</script>
