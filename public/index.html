<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องจ่ายน้ำอัจฉริยะ</title>
    <style>
        body { font-family: 'Kanit', sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        img { width: 250px; margin-top: 15px; }
        .success { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💧 เลือกรายการน้ำ</h2>
        <button onclick="generateQR(10)">10 บาท</button>
        <button onclick="generateQR(20)">20 บาท</button>
        <div id="qr-area"></div>
        <hr>
        <h3>แสกนแล้วอัปโหลดสลิป</h3>
        <input type="file" id="slipInput" accept="image/*">
        <br><br>
        <button onclick="verifySlip()" style="background: #28a745;">ยืนยันการจ่ายเงิน</button>
        <p id="status"></p>
    </div>

    <script>
        async function generateQR(price) {
            const res = await fetch('/generateQR', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount: price })
            });
            const data = await res.json();
            document.getElementById('qr-area').innerHTML = `<p>ราคา ${price} บาท</p><img src="${data.qrImage}">`;
        }

        async function verifySlip() {
            const file = document.getElementById('slipInput').files[0];
            const status = document.getElementById('status');
            if(!file) return alert("กรุณาเลือกรูปสลิป");

            const formData = new FormData();
            formData.append('slip', file);
            status.innerText = "กำลังตรวจสอบความถูกต้อง...";

            try {
                const res = await fetch('/verify-slip', { method: 'POST', body: formData });
                const result = await res.json();
                if(result.success) {
                    status.innerHTML = `<span class="success">ชำระเงินสำเร็จ! เครื่องกำลังจ่ายน้ำ...</span>`;
                } else {
                    status.innerText = "ข้อผิดพลาด: " + result.message;
                }
            } catch (e) { status.innerText = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้"; }
        }
    </script>
</body>
</html>
